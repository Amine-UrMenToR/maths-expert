<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages — Maths Expert</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/chat.css" />
</head>

<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">∑</div>
                <div class="sidebar-logo">Maths Expert</div>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar"><span class="user-avatar-letter">E</span></div>
                <div>
                    <div class="user-name"></div>
                    <div class="user-role"></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Navigation</div>
                <a class="nav-item" href="/student/dashboard.html"><span class="nav-icon">🏠</span>Tableau de bord</a>
                <a class="nav-item" href="/student/courses.html"><span class="nav-icon">📚</span>Cours & Vidéos</a>
                <a class="nav-item active" href="/student/chat.html"><span class="nav-icon">💬</span>Messages</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost w-full">🚪 Se déconnecter</button>
            </div>
        </aside>

        <div class="main-content" style="padding:0;overflow:hidden">
            <div class="chat-layout">
                <!-- Chat Sidebar -->
                <div class="chat-sidebar">
                    <div class="chat-sidebar-header">
                        <h4>💬 Messagerie</h4>
                    </div>
                    <div class="chat-tabs">
                        <div class="chat-tab active" onclick="switchTab('groups', this)">Groupes</div>
                        <div class="chat-tab" onclick="switchTab('privates', this)">Privés</div>
                        <div class="chat-tab" onclick="switchTab('profs', this)">Professeurs</div>
                    </div>
                    <div class="chat-list" id="groups-tab-content">
                        <div id="groups-list">
                            <div class="spinner"></div>
                        </div>
                        <div style="padding:1rem;border-top:1px solid var(--border);margin-top:.5rem">
                            <p class="text-xs text-muted mb-2" style="margin-bottom:.5rem">Rejoindre un groupe
                                disponible :</p>
                            <div id="available-groups"></div>
                        </div>
                    </div>
                    <div class="chat-list hidden" id="privates-tab-content">
                        <div id="privates-list"></div>
                    </div>
                    <div class="chat-list hidden" id="profs-tab-content">
                        <div id="professors-list"></div>
                    </div>
                </div>

                <!-- Chat Main -->
                <div class="chat-main">
                    <!-- État vide -->
                    <div id="chat-empty-state" class="chat-empty" style="flex:1;display:flex">
                        <div class="chat-empty-icon">💬</div>
                        <h4>Démarrez une conversation</h4>
                        <p>Sélectionnez un groupe ou un professeur pour commencer à discuter</p>
                    </div>

                    <!-- Chat actif -->
                    <div id="chat-active" class="hidden"
                        style="display:flex;flex-direction:column;flex:1;overflow:hidden">
                        <div class="chat-header">
                            <div class="chat-header-info">
                                <div>
                                    <h4 id="chat-header-name"></h4>
                                    <div class="sub" id="chat-header-sub"></div>
                                </div>
                            </div>
                        </div>
                        <div class="chat-messages" id="messages-container"></div>
                        <div class="chat-input-area">
                            <form id="send-form">
                                <div class="chat-input-box">
                                    <textarea id="msg-input" placeholder="Écrivez votre message…" rows="1"></textarea>
                                    <button type="submit" class="send-btn">➤</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Members panel -->
                <div class="members-panel hidden" id="members-panel">
                    <h5>Membres du groupe</h5>
                    <div id="members-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab, el) {
            document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('groups-tab-content').classList.add('hidden');
            document.getElementById('privates-tab-content').classList.add('hidden');
            document.getElementById('profs-tab-content').classList.add('hidden');
            document.getElementById(tab + '-tab-content').classList.remove('hidden');
        }
    </script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="module" src="/js/chat.js"></script>
</body>

</html>
