<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cours & Vidéos — Maths Expert</title>
    <link rel="stylesheet" href="/css/main.css" />
</head>

<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">∑</div>
                <div class="sidebar-logo">Maths Expert</div>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar"><span class="user-avatar-letter">E</span></div>
                <div>
                    <div class="user-name"></div>
                    <div class="user-role"></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Navigation</div>
                <a class="nav-item" href="/student/dashboard.html"><span class="nav-icon">🏠</span>Tableau de bord</a>
                <a class="nav-item active" href="/student/courses.html"><span class="nav-icon">📚</span>Cours &
                    Vidéos</a>
                <a class="nav-item" href="/student/chat.html"><span class="nav-icon">💬</span>Messages</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost w-full">🚪 Se déconnecter</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="topbar">
                <div class="topbar-title">Cours & Vidéos 📚</div>
                <div class="topbar-right">
                    <div class="search-bar">
                        <span>🔍</span>
                        <input type="text" id="search-courses" placeholder="Rechercher un cours…" />
                    </div>
                </div>
            </div>

            <div class="page-content">
                <!-- Section Cours -->
                <div class="page-header">
                    <div>
                        <h3>Tous les cours</h3>
                        <p>Inscrivez-vous aux cours qui vous intéressent</p>
                    </div>
                </div>
                <div class="courses-grid" id="courses-container">
                    <div class="spinner"></div>
                </div>

                <!-- Section Vidéos -->
                <div class="page-header" style="margin-top:3rem">
                    <div>
                        <h3>Vidéos pédagogiques 🎥</h3>
                        <p>Regardez les vidéos publiées par les professeurs</p>
                    </div>
                </div>
                <div class="courses-grid" id="videos-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/js/student.js"></script>
</body>

</html>
