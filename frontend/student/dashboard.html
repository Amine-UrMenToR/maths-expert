<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de bord — Maths Expert</title>
    <link rel="stylesheet" href="/css/main.css" />
</head>

<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">∑</div>
                <div class="sidebar-logo">Maths Expert</div>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar"><span class="user-avatar-letter">E</span></div>
                <div>
                    <div class="user-name"></div>
                    <div class="user-role"></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Navigation</div>
                <a class="nav-item active" href="/student/dashboard.html"><span class="nav-icon">🏠</span>Tableau de
                    bord</a>
                <a class="nav-item" href="/student/courses.html"><span class="nav-icon">📚</span>Cours & Vidéos</a>
                <a class="nav-item" href="/student/chat.html"><span class="nav-icon">💬</span>Messages</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost w-full">🚪 Se déconnecter</button>
            </div>
        </aside>

        <!-- Main -->
        <div class="main-content">
            <div class="topbar">
                <div class="topbar-title">Tableau de bord 🎓</div>
                <div class="topbar-right">
                    <a href="/student/courses.html" class="btn btn-primary btn-sm">Voir les cours</a>
                </div>
            </div>

            <div class="page-content">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📚</div>
                        <div class="stat-number" id="enrolled-count">—</div>
                        <div class="stat-label">Cours inscrits</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🌐</div>
                        <div class="stat-number" id="total-courses">—</div>
                        <div class="stat-label">Cours disponibles</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎥</div>
                        <div class="stat-number" id="total-videos">—</div>
                        <div class="stat-label">Vidéos disponibles</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💬</div>
                        <div class="stat-number">∞</div>
                        <div class="stat-label">Messages disponibles</div>
                    </div>
                </div>

                <!-- Cours récents -->
                <div class="page-header">
                    <div>
                        <h3>Mes cours inscrits</h3>
                        <p>Vos dernières inscriptions</p>
                    </div>
                    <a href="/student/courses.html" class="btn btn-outline btn-sm">Voir tout</a>
                </div>
                <div class="courses-grid" id="recent-courses">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/js/student.js"></script>
</body>

</html>
